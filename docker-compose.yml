version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: gestao_ambiental_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gestam16_gestao_ambiental
      MYSQL_USER: gestam16_douglas
      MYSQL_PASSWORD: R3sende!23
    ports:
      - "3306:3306"
    volumes:
      - db_volume:/var/lib/mysql
      - ./tabelas_gestao_ambiental.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - gestao_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP-FPM
  php:
    build: .
    container_name: gestao_ambiental_php
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      - DB_HOST=mysql
      - DB_USER=gestam16_douglas
      - DB_PASS=R3sende!23
      - DB_NAME=gestam16_gestao_ambiental
      - APP_ENV=production
      - APP_DEBUG=false
      - TIMEZONE=America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gestao_network

  # Nginx Web Server
  nginx:
    image: nginx:latest
    container_name: gestao_ambiental_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - php
    networks:
      - gestao_network
    environment:
      - TZ=America/Sao_Paulo

  # phpMyAdmin (opcional - apenas desenvolvimento)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gestao_ambiental_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - mysql
    networks:
      - gestao_network
    profiles:
      - dev  # Apenas ativar em desenvolvimento: docker-compose --profile dev up

volumes:
  db_volume:
    driver: local

networks:
  gestao_network:
    driver: bridge
